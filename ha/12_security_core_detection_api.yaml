rest:
  - resource: "http://REDACTED/api/v1/stats/incidents"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 10
    sensor:
      - name: "Security Core Open Incidents"
        unique_id: security_core_open_incidents
        value_template: "{{ value_json.open_incidents | default(0, true) }}"
      - name: "Security Core Critical Open Incidents"
        unique_id: security_core_critical_open_incidents
        value_template: "{{ value_json.critical_open_incidents | default(0, true) }}"
      - name: "Security Core High Open Incidents"
        unique_id: security_core_high_open_incidents
        value_template: "{{ value_json.high_open_incidents | default(0, true) }}"
      - name: "Security Core Medium Open Incidents"
        unique_id: security_core_medium_open_incidents
        value_template: "{{ value_json.medium_open_incidents | default(0, true) }}"
      - name: "Security Core Closed Incidents"
        unique_id: security_core_closed_incidents
        value_template: "{{ value_json.closed_incidents | default(0, true) }}"
      - name: "Security Core Incidents Last 24h"
        unique_id: security_core_incidents_last_24h
        value_template: "{{ value_json.incidents_last_24h | default(0, true) }}"
      - name: "Security Core Security Events Last 24h"
        unique_id: security_core_security_events_last_24h
        value_template: "{{ value_json.events_last_24h | default(0, true) }}"
      - name: "Security Core Suricata Alerts Last 24h"
        unique_id: security_core_suricata_alerts_last_24h
        value_template: "{{ value_json.suricata_alerts_last_24h | default(0, true) }}"
      - name: "Security Core DNS Events Last 24h"
        unique_id: security_core_dns_events_last_24h
        value_template: "{{ value_json.dns_events_last_24h | default(0, true) }}"
      - name: "Security Core DNS Blocks Last 24h"
        unique_id: security_core_dns_blocks_last_24h
        value_template: "{{ value_json.dns_blocks_last_24h | default(0, true) }}"
      - name: "Security Core Anomalies Last 24h"
        unique_id: security_core_anomalies_last_24h
        value_template: "{{ value_json.anomalies_last_24h | default(0, true) }}"
      - name: "Security Core Critical Events Last 24h"
        unique_id: security_core_critical_events_last_24h
        value_template: "{{ value_json.critical_events_last_24h | default(0, true) }}"
      - name: "Security Core High Events Last 24h"
        unique_id: security_core_high_events_last_24h
        value_template: "{{ value_json.high_events_last_24h | default(0, true) }}"
      - name: "Security Core Correlations Last 24h"
        unique_id: security_core_correlations_last_24h
        value_template: "{{ value_json.correlations_last_24h | default(0, true) }}"
      - name: "Security Core IDS DNS Correlations Last 24h"
        unique_id: security_core_ids_dns_correlations_last_24h
        value_template: "{{ value_json.ids_dns_correlations_last_24h | default(0, true) }}"
      - name: "Security Core Baseline Anomalies Last 24h"
        unique_id: security_core_baseline_anomalies_last_24h
        value_template: "{{ value_json.baseline_anomalies_last_24h | default(0, true) }}"
      - name: "Security Core Traffic Volume Spikes Last 24h"
        unique_id: security_core_traffic_volume_spikes_last_24h
        value_template: "{{ value_json.traffic_volume_spikes_last_24h | default(0, true) }}"
      - name: "Security Core Outbound Connection Bursts Last 24h"
        unique_id: security_core_outbound_connection_bursts_last_24h
        value_template: "{{ value_json.outbound_connection_bursts_last_24h | default(0, true) }}"
      - name: "Security Core New Destination Countries Last 24h"
        unique_id: security_core_new_destination_country_events_last_24h
        value_template: "{{ value_json.new_destination_country_events_last_24h | default(0, true) }}"
      - name: "Security Core OPNsense Flow Events Last 24h"
        unique_id: security_core_opnsense_flow_events_last_24h
        value_template: "{{ value_json.opnsense_flow_events_last_24h | default(0, true) }}"
      - name: "Security Core OPNsense Flow Bytes Last 24h"
        unique_id: security_core_opnsense_flow_bytes_last_24h
        value_template: "{{ value_json.opnsense_flow_bytes_last_24h | default(0, true) }}"
        unit_of_measurement: "B"
        device_class: data_size
        state_class: total
      - name: "Security Core OPNsense Flow Countries Last 24h"
        unique_id: security_core_opnsense_flow_countries_last_24h
        value_template: "{{ value_json.opnsense_flow_countries_last_24h | default(0, true) }}"

  - resource: "http://REDACTED/api/v1/incidents?status=open_like&limit=150"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 10
    sensor:
      - name: "Security Core Incidents Raw"
        unique_id: security_core_incidents_raw
        value_template: >-
          {% set total = value_json.total | default(0, true) %}
          {% set items = value_json['items'] if value_json is mapping and 'items' in value_json else [] %}
          {% set latest_list = items | map(attribute='updated_at') | reject('equalto', none) | list %}
          {% set latest = latest_list | max if latest_list | length > 0 else 'none' %}
          {{ total ~ '|' ~ latest }}
        json_attributes:
          - items
          - total

