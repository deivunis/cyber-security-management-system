<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Security Core šalies srauto žemėlapis</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root{--bg:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--soft:#f3f4f6;--ok:#16a34a;--bad:#dc2626}
    @media (prefers-color-scheme:dark){:root{--bg:#111827;--text:#f3f4f6;--muted:#a9b3c1;--line:#374151;--soft:#1f2937}}
    html,body{margin:0;padding:0;height:100%;min-height:420px;background:transparent;font-family:Roboto,Arial,sans-serif;color:var(--text)}
    .card{height:100vh;min-height:420px;box-sizing:border-box;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--bg);display:grid;grid-template-rows:auto 1fr}
    .header{padding:14px 16px 10px;display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid var(--line);align-items:flex-start}
    .title{font-size:20px;font-weight:800;line-height:1.15}.subtitle{margin-top:4px;font-size:13px;color:var(--muted)}
    .stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.stat{min-width:92px;padding:8px 10px;border-radius:12px;background:var(--soft);text-align:right}.stat b{display:block;font-size:16px;line-height:1.1}.stat span{display:block;margin-top:3px;color:var(--muted);font-size:11px}
    .main{display:grid;grid-template-columns:minmax(0,1fr) 330px;min-height:0}#map{width:100%;height:100%;min-height:340px;background:#dff2f7;position:relative}.side{border-left:1px solid var(--line);padding:12px;overflow:auto;background:var(--bg)}.side h3{margin:0 0 10px;font-size:14px;font-weight:800}
    .row{display:grid;grid-template-columns:24px 12px minmax(0,1fr) auto;grid-template-rows:auto 7px;align-items:center;column-gap:8px;row-gap:6px;padding:8px 0;border-bottom:1px solid var(--line)}.row:last-child{border-bottom:0}.rank{color:var(--muted);font-size:12px}.dot{width:10px;height:10px;border-radius:99px}.country{overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:13px}.country b{color:var(--muted);font-weight:700;margin-left:4px}.bytes{font-size:12px;font-variant-numeric:tabular-nums}.bar{grid-column:3/5;height:7px;border-radius:999px;background:var(--soft);overflow:hidden}.bar span{display:block;height:100%;border-radius:999px}
    .message{margin:14px;padding:14px;border-radius:12px;border:1px solid var(--line);background:var(--soft);line-height:1.45;font-size:13px;white-space:pre-wrap}.error{border-color:#fecaca;background:#fff5f5;color:#991b1b;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.leaflet-container{font-family:Roboto,Arial,sans-serif}.leaflet-popup-content{margin:10px 12px;font-size:13px;line-height:1.35}
    .map-error-overlay{position:absolute;z-index:1000;left:16px;right:16px;top:16px;max-height:45%;overflow:auto}
    .fallback-map{width:100%;height:100%;min-height:340px;display:block;background:linear-gradient(180deg,#dff2f7,#f5fbfd)}
    @media(max-width:900px){.card{height:auto}.main{grid-template-columns:1fr}.side{border-left:0;border-top:1px solid var(--line);max-height:260px}#map{height:360px}.header{flex-direction:column}.stats{justify-content:flex-start}}
  </style>
</head>
<body>
<div class="card">
  <div class="header"><div><div class="title">Pasaulio srauto žemėlapis</div><div class="subtitle">Šalys, į kurias fiksuotas Security Core egress srautas</div></div><div class="stats"><div class="stat"><b id="activeCountries">–</b><span>aktyvios šalys</span></div><div class="stat"><b id="totalTraffic">–</b><span>24h srautas</span></div></div></div>
  <div class="main"><div id="map"></div><div class="side"><h3>Top šalys pagal srautą</h3><div id="countryList"><div class="message">Kraunami duomenys...</div></div></div></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const GEO_ENTITY='sensor.security_core_main_geo_communications_raw';
const TRAFFIC_ENTITY='sensor.security_core_main_traffic_samples_raw';
const ACTIVE_COUNTRIES_ENTITY='sensor.security_core_main_active_countries_24h';
const TOTAL_MB_ENTITY='sensor.security_core_main_traffic_mb_24h';
const WORLD_GEOJSON_URL='https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson';
const COUNTRY_NAMES={US:'United States',CA:'Canada',MX:'Mexico',BR:'Brazil',AR:'Argentina',CL:'Chile',CO:'Colombia',PE:'Peru',GB:'United Kingdom',IE:'Ireland',FR:'France',DE:'Germany',LT:'Lithuania',LV:'Latvia',EE:'Estonia',PL:'Poland',NL:'Netherlands',BE:'Belgium',LU:'Luxembourg',ES:'Spain',PT:'Portugal',IT:'Italy',CH:'Switzerland',AT:'Austria',CZ:'Czechia',SK:'Slovakia',HU:'Hungary',RO:'Romania',BG:'Bulgaria',GR:'Greece',SE:'Sweden',NO:'Norway',FI:'Finland',DK:'Denmark',UA:'Ukraine',BY:'Belarus',RU:'Russia',TR:'Turkey',CN:'China',JP:'Japan',KR:'South Korea',IN:'India',ID:'Indonesia',SG:'Singapore',TH:'Thailand',VN:'Vietnam',MY:'Malaysia',PH:'Philippines',AU:'Australia',NZ:'New Zealand',ZA:'South Africa',NG:'Nigeria',EG:'Egypt',MA:'Morocco',IL:'Israel',AE:'United Arab Emirates',SA:'Saudi Arabia',IR:'Iran',IQ:'Iraq',PK:'Pakistan',AF:'Afghanistan',KZ:'Kazakhstan'};
const COUNTRY_COORDS={US:[39.8,-98.6],CA:[56.1,-106.3],MX:[23.6,-102.5],BR:[-10.8,-52.9],AR:[-38.4,-63.6],CL:[-35.7,-71.5],CO:[4.6,-74.1],PE:[-9.2,-75],GB:[55.4,-3.4],IE:[53.4,-8.2],FR:[46.2,2.2],DE:[51.2,10.4],LT:[55.2,23.9],LV:[56.9,24.6],EE:[58.6,25],PL:[51.9,19.1],NL:[52.1,5.3],BE:[50.5,4.5],LU:[49.8,6.1],ES:[40.4,-3.7],PT:[39.4,-8.2],IT:[41.9,12.6],CH:[46.8,8.2],AT:[47.5,14.5],CZ:[49.8,15.5],SK:[48.7,19.7],HU:[47.2,19.5],RO:[45.9,24.9],BG:[42.7,25.5],GR:[39.1,21.8],SE:[60.1,18.6],NO:[60.5,8.5],FI:[61.9,25.7],DK:[56.2,9.5],UA:[48.4,31.2],BY:[53.7,27.9],RU:[61.5,105.3],TR:[39,35.2],CN:[35.9,104.2],JP:[36.2,138.3],KR:[36.5,127.8],IN:[20.6,78.9],ID:[-0.8,113.9],SG:[1.35,103.8],TH:[15.8,101],VN:[14.1,108.3],MY:[4.2,101.9],PH:[12.9,121.8],AU:[-25.3,133.8],NZ:[-40.9,174.9],ZA:[-30.6,22.9],NG:[9.1,8.7],EG:[26.8,30.8],MA:[31.8,-7.1],IL:[31,35],AE:[23.4,53.8],SA:[23.9,45.1],IR:[32.4,53.7],IQ:[33.2,43.7],PK:[30.4,69.3],AF:[33.9,67.7],KZ:[48,66.9]};
const A3_TO_A2={USA:'US',CAN:'CA',MEX:'MX',BRA:'BR',ARG:'AR',CHL:'CL',COL:'CO',PER:'PE',GBR:'GB',IRL:'IE',FRA:'FR',DEU:'DE',LTU:'LT',LVA:'LV',EST:'EE',POL:'PL',NLD:'NL',BEL:'BE',LUX:'LU',ESP:'ES',PRT:'PT',ITA:'IT',CHE:'CH',AUT:'AT',CZE:'CZ',SVK:'SK',HUN:'HU',ROU:'RO',BGR:'BG',GRC:'GR',SWE:'SE',NOR:'NO',FIN:'FI',DNK:'DK',UKR:'UA',BLR:'BY',RUS:'RU',TUR:'TR',CHN:'CN',JPN:'JP',KOR:'KR',IND:'IN',IDN:'ID',SGP:'SG',THA:'TH',VNM:'VN',MYS:'MY',PHL:'PH',AUS:'AU',NZL:'NZ',ZAF:'ZA',NGA:'NG',EGY:'EG',MAR:'MA',ISR:'IL',ARE:'AE',SAU:'SA',IRN:'IR',IRQ:'IQ',PAK:'PK',AFG:'AF',KAZ:'KZ'};
let mapInstance=null,countryLayer=null,markerLayer=null,geoJsonCache=null,isRunning=false,renderedOnce=false;
function esc(v){return String(v??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
function num(v){const n=Number(v);return Number.isFinite(n)?n:0;}
function formatBytes(bytes){const n=num(bytes);if(n>=1073741824)return(n/1073741824).toFixed(2)+' GB';if(n>=1048576)return(n/1048576).toFixed(2)+' MB';if(n>=1024)return(n/1024).toFixed(1)+' KB';return Math.round(n)+' B';}
function color(value,max){if(!max||value<=0)return'#d1d5db';const t=Math.max(.12,Math.min(1,value/max));const hue=205-t*165;const sat=78+t*10;const light=58-t*14;return`hsl(${hue}, ${sat}%, ${light}%)`;}
function getHassFromWindow(win){try{if(!win||!win.document)return null;const ha=win.document.querySelector('home-assistant');if(ha&&ha.hass)return ha.hass;const hui=win.document.querySelector('hui-root');if(hui&&hui.hass)return hui.hass;}catch(e){}return null;}
function getHass(){return getHassFromWindow(window.parent)||getHassFromWindow(window.top)||getHassFromWindow(window);}
function stateFromParent(entityId){const hass=getHass();return hass&&hass.states? hass.states[entityId] : null;}
function getToken(){for(const key of ['hassTokens','tokens']){try{const raw=localStorage.getItem(key);if(!raw)continue;const data=JSON.parse(raw);if(data?.access_token)return data.access_token;if(data?.data?.access_token)return data.data.access_token;}catch(e){}}return'';}
async function fetchState(entityId){const fromParent=stateFromParent(entityId);if(fromParent)return fromParent;const headers={Accept:'application/json'};const token=getToken();if(token)headers.Authorization='Bearer '+token;const response=await fetch('/api/states/'+encodeURIComponent(entityId),{headers,credentials:'include',cache:'no-store'});if(!response.ok)throw new Error(`${entityId}: HTTP ${response.status}`);return response.json();}
async function loadStates(){const states={},errors=[];for(const id of [GEO_ENTITY,TRAFFIC_ENTITY,ACTIVE_COUNTRIES_ENTITY,TOTAL_MB_ENTITY]){try{states[id]=await fetchState(id);}catch(err){errors.push(String(err?.message||err));}}if(!Object.keys(states).length)throw new Error(errors.join('\n')||'Nepavyko nuskaityti Home Assistant states.');return states;}
function itemsFromState(st){const items=st?.attributes?.items;return Array.isArray(items)?items:[];}
function normCc(v){const cc=String(v||'').trim().toUpperCase();if(!cc||['UNKNOWN','NULL','NONE','ZZ'].includes(cc))return'';if(/^[A-Z]{2}$/.test(cc))return cc;if(/^[A-Z]{3}$/.test(cc)&&A3_TO_A2[cc])return A3_TO_A2[cc];return'';}
function collectRows(states){const totals=new Map(),samples=new Map(),devices=new Map();for(const item of itemsFromState(states[GEO_ENTITY])){const cc=normCc(item.country_code||item.country);if(!cc)continue;const bytes=num(item.bytes_total??item.total_bytes??item.bytes??item.bytes_delta??0);totals.set(cc,(totals.get(cc)||0)+bytes);samples.set(cc,(samples.get(cc)||0)+num(item.sample_count??item.samples??item.connection_count??1));devices.set(cc,Math.max(devices.get(cc)||0,num(item.device_count??item.devices??0)));}if(!totals.size){for(const item of itemsFromState(states[TRAFFIC_ENTITY])){const cc=normCc(item.country_code||item.country);if(!cc)continue;const bytes=num(item.bytes_delta??item.bytes_total??item.total_bytes??item.bytes??0);totals.set(cc,(totals.get(cc)||0)+bytes);samples.set(cc,(samples.get(cc)||0)+1);const deviceKey=item.device_id||item.device_ip||item.device_hostname||'';if(deviceKey)devices.set(cc,Math.max(devices.get(cc)||0,1));}}return[...totals.entries()].map(([cc,bytes])=>({cc,name:COUNTRY_NAMES[cc]||cc,bytes,samples:samples.get(cc)||0,devices:devices.get(cc)||0})).sort((a,b)=>b.bytes-a.bytes);}
function updateStats(rows,states){const totalBytes=rows.reduce((s,r)=>s+r.bytes,0);const activeFallback=states[ACTIVE_COUNTRIES_ENTITY]?.state||rows.length;const totalMbFallback=states[TOTAL_MB_ENTITY]?.state||'';document.getElementById('activeCountries').textContent=rows.length||activeFallback||'0';document.getElementById('totalTraffic').textContent=totalBytes>0?formatBytes(totalBytes):(totalMbFallback?`${totalMbFallback} MB`:'0 MB');}
function renderList(rows){const box=document.getElementById('countryList');const max=rows.length?rows[0].bytes:0;if(!rows.length){box.innerHTML='<div class="message">GeoIP srauto duomenų dar nėra.</div>';return;}box.innerHTML=rows.slice(0,12).map((row,i)=>{const c=color(row.bytes,max),pct=max?Math.round(row.bytes/max*100):0;return`<div class="row"><span class="rank">${i+1}</span><span class="dot" style="background:${c}"></span><span class="country">${esc(row.name)} <b>${esc(row.cc)}</b></span><span class="bytes">${formatBytes(row.bytes)}</span><span class="bar"><span style="width:${pct}%;background:${c}"></span></span></div>`;}).join('');}
function ccFromFeature(feature){const p=feature.properties||{};for(const v of [p['ISO3166-1-Alpha-2'],p.ISO_A2,p.iso_a2,p.WB_A2,p.POSTAL,p.ADM0_A3,p.ISO_A3,p.iso_a3]){const cc=normCc(v);if(cc)return cc;}return'';}
async function getGeoJson(){if(!geoJsonCache){geoJsonCache=fetch(WORLD_GEOJSON_URL,{cache:'force-cache'}).then(r=>{if(!r.ok)throw new Error('GeoJSON HTTP '+r.status);return r.json();});}return geoJsonCache;}
function resetMapContainer(){try{if(mapInstance){mapInstance.off();mapInstance.remove();}}catch(e){}mapInstance=null;countryLayer=null;markerLayer=null;const old=document.getElementById('map');const fresh=old.cloneNode(false);old.replaceWith(fresh);return fresh;}
function initMap(){if(mapInstance&&mapInstance._container)return;let el=document.getElementById('map');if(el._leaflet_id)el=resetMapContainer();else el.innerHTML='';try{mapInstance=L.map(el,{zoomControl:true,attributionControl:true,worldCopyJump:true}).setView([30,15],2);}catch(err){if(/already initialized/i.test(String(err&&err.message||err))){el=resetMapContainer();mapInstance=L.map(el,{zoomControl:true,attributionControl:true,worldCopyJump:true}).setView([30,15],2);}else{throw err;}}L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:6,minZoom:2,attribution:'&copy; OpenStreetMap'}).addTo(mapInstance);markerLayer=L.layerGroup().addTo(mapInstance);setTimeout(()=>mapInstance&&mapInstance.invalidateSize(),250);}
function renderFallbackMap(rows,message){resetMapContainer();const box=document.getElementById('map');const max=rows.length?rows[0].bytes:0;const markers=rows.filter(r=>COUNTRY_COORDS[r.cc]).map(r=>{const [lat,lon]=COUNTRY_COORDS[r.cc];const x=(lon+180)/360*1000;const y=(90-lat)/180*500;const radius=6+Math.min(24,max?(r.bytes/max)*24:0);const c=color(r.bytes,max);return`<g><circle cx="${x}" cy="${y}" r="${radius}" fill="${c}" fill-opacity="0.78" stroke="#111827" stroke-width="1.4"></circle><text x="${x}" y="${y+radius+12}" text-anchor="middle" font-size="12" font-family="Arial" fill="#1f2937">${esc(r.cc)}</text><title>${esc(r.name)}: ${formatBytes(r.bytes)}</title></g>`;}).join('');box.innerHTML=`<svg class="fallback-map" viewBox="0 0 1000 500" role="img"><rect x="0" y="0" width="1000" height="500" fill="#dff2f7"></rect><ellipse cx="230" cy="170" rx="125" ry="90" fill="#eef2f7" stroke="#cbd5e1"></ellipse><ellipse cx="260" cy="330" rx="95" ry="120" fill="#eef2f7" stroke="#cbd5e1"></ellipse><ellipse cx="510" cy="145" rx="145" ry="75" fill="#eef2f7" stroke="#cbd5e1"></ellipse><ellipse cx="545" cy="265" rx="110" ry="125" fill="#eef2f7" stroke="#cbd5e1"></ellipse><ellipse cx="710" cy="190" rx="185" ry="95" fill="#eef2f7" stroke="#cbd5e1"></ellipse><ellipse cx="815" cy="360" rx="85" ry="55" fill="#eef2f7" stroke="#cbd5e1"></ellipse>${markers}<text x="24" y="34" font-size="16" font-family="Arial" fill="#1f2937">${esc(message||'Supaprastintas šalių žemėlapis')}</text></svg>`;}
async function renderMap(rows){if(!window.L){renderFallbackMap(rows,'Leaflet neįkeltas, rodoma supaprastinta srauto schema');return;}initMap();const active=new Map(rows.map(r=>[r.cc,r]));const max=rows.length?rows[0].bytes:0;if(countryLayer){mapInstance.removeLayer(countryLayer);countryLayer=null;}if(markerLayer){markerLayer.clearLayers();}
  try{const geojson=await getGeoJson();countryLayer=L.geoJSON(geojson,{style:f=>{const cc=ccFromFeature(f),row=active.get(cc);return row?{color:'#111827',weight:1.1,fillColor:color(row.bytes,max),fillOpacity:.78}:{color:'#cbd5e1',weight:.6,fillColor:'#f1f5f9',fillOpacity:.42};},onEachFeature:(feature,layer)=>{const cc=ccFromFeature(feature),row=active.get(cc);const name=row?.name||feature.properties?.ADMIN||feature.properties?.name||cc||'Unknown';if(row){layer.bindPopup(`<b>${esc(name)} (${esc(cc)})</b><br>Srautas: <b>${formatBytes(row.bytes)}</b><br>Įvykiai / samples: ${esc(row.samples)}<br>Įrenginiai: ${esc(row.devices)}`);}}}).addTo(mapInstance);}catch(err){renderFallbackMap(rows,'GeoJSON nepavyko įkelti, rodoma supaprastinta srauto schema');return;}
  for(const row of rows){const coords=COUNTRY_COORDS[row.cc];if(!coords)continue;const radius=5+Math.min(22,max?row.bytes/max*22:0);L.circleMarker(coords,{radius,fillColor:color(row.bytes,max),color:'#111827',weight:1,opacity:1,fillOpacity:.8}).bindPopup(`<b>${esc(row.name)} (${esc(row.cc)})</b><br>Srautas: <b>${formatBytes(row.bytes)}</b><br>Įvykiai / samples: ${esc(row.samples)}<br>Įrenginiai: ${esc(row.devices)}`).addTo(markerLayer);}
  setTimeout(()=>mapInstance&&mapInstance.invalidateSize(),100);
}
function showError(err){const message=`Žemėlapis neužsikrovė.\n\n${esc(err?.message||err)}\n\nPatikrink, ar sensoriai egzistuoja ir ar naršyklės Console nėra papildomos klaidos.`;if(!renderedOnce){document.getElementById('map').innerHTML=`<div class="message error">${message}</div>`;}else{const el=document.getElementById('map');let overlay=document.getElementById('mapErrorOverlay');if(!overlay){overlay=document.createElement('div');overlay.id='mapErrorOverlay';overlay.className='message error map-error-overlay';el.appendChild(overlay);}overlay.textContent=message;}document.getElementById('countryList').innerHTML=`<div class="message error">${esc(err?.message||err)}</div>`;}
async function main(){if(isRunning)return;isRunning=true;try{const states=await loadStates();const rows=collectRows(states);updateStats(rows,states);renderList(rows);await renderMap(rows);renderedOnce=true;}catch(err){showError(err);}finally{isRunning=false;}}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',main,{once:true});else main();
window.addEventListener('resize',()=>{try{if(mapInstance)mapInstance.invalidateSize();}catch(e){}},{passive:true});
window.addEventListener('pageshow',()=>{try{if(mapInstance)mapInstance.invalidateSize();}catch(e){}},{passive:true});
</script>
</body>
</html>
