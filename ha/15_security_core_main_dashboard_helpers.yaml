# Security Core Pagrindinis dashboard helper package v2
# Copy to: /config/packages/15_security_core_main_dashboard_helpers.yaml
# Requires in /config/secrets.yaml:
# security_core_api_bearer: "Bearer YOUR_SECURITY_CORE_API_KEY"

rest:

  - resource: "http://REDACTED/health"
    method: GET
    scan_interval: 30
    sensor:
      - name: "Security Core Main Health Extended Raw"
        unique_id: security_core_main_health_extended_raw
        value_template: "{{ (value_json.components | length) if value_json.components is defined else 0 }}"
        json_attributes:
          - components
          - component_total
          - component_healthy
          - component_problem
          - status
          - database
  - resource: "http://REDACTED/api/v1/devices?limit=500"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 15
    sensor:
      - name: "Security Core Main Inventory Raw"
        unique_id: security_core_main_inventory_raw
        value_template: "{{ value_json.total | default(0) }}"
        json_attributes:
          - items
          - total

  - resource: "http://REDACTED/api/v1/system-health?include_details=false&limit=100"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 30
    sensor:
      - name: "Security Core Main System Health Raw"
        unique_id: security_core_main_system_health_raw
        value_template: "{{ (value_json.items | length) if value_json.items is defined else 0 }}"
        json_attributes:
          - items

  - resource: "http://REDACTED/api/v1/stats/top-risky-devices?limit=10"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 60
    sensor:
      - name: "Security Core Main Top Risky Devices Raw"
        unique_id: security_core_main_top_risky_devices_raw
        value_template: "{{ (value_json.items | length) if value_json.items is defined else 0 }}"
        json_attributes:
          - items

  - resource: "http://REDACTED/api/v1/stats/geo-communications?hours=24&limit=50"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 60
    sensor:
      - name: "Security Core Main Geo Communications Raw"
        unique_id: security_core_main_geo_communications_raw
        value_template: "{{ (value_json.items | length) if value_json.items is defined else 0 }}"
        json_attributes:
          - items

  - resource: "http://REDACTED/api/v1/stats/dns-summary?hours=24&limit=50"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 60
    sensor:
      - name: "Security Core Main DNS Summary Raw"
        unique_id: security_core_main_dns_summary_raw
        value_template: "{{ (value_json.items | length) if value_json.items is defined else 0 }}"
        json_attributes:
          - items

  - resource: "http://REDACTED/api/v1/incidents?status=open_like&limit=150"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 15
    sensor:
      - name: "Security Core Main Open Incidents Raw"
        unique_id: security_core_main_open_incidents_raw
        value_template: "{{ value_json.total | default(0) }}"
        json_attributes:
          - items
          - total

  - resource: "http://REDACTED/api/v1/captures?limit=50"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 15
    sensor:
      - name: "Security Core Main Captures Raw"
        unique_id: security_core_main_captures_raw
        value_template: "{{ value_json.total | default(0) }}"
        json_attributes:
          - items
          - total

  - resource: "http://REDACTED/api/v1/reports?limit=50"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 60
    sensor:
      - name: "Security Core Main Reports Raw"
        unique_id: security_core_main_reports_raw
        value_template: "{{ value_json.total | default(0) }}"
        json_attributes:
          - items
          - total

  - resource: "http://REDACTED/api/v1/traffic-samples?direction=outbound&limit=150"
    method: GET
    headers:
      Authorization: !secret security_core_api_bearer
    scan_interval: 30
    sensor:
      - name: "Security Core Main Traffic Samples Raw"
        unique_id: security_core_main_traffic_samples_raw
        value_template: "{{ value_json.total | default(0) }}"
        json_attributes:
          - items
          - total

template:
  - sensor:
      - name: "Security Core Main Risk Index"
        unique_id: security_core_main_risk_index
        icon: mdi:shield-alert
        unit_of_measurement: "%"
        state: >-
          {% set critical_inc = states('sensor.security_core_critical_open_incidents') | int(0) %}
          {% set high_inc = states('sensor.security_core_high_open_incidents') | int(0) %}
          {% set med_inc = states('sensor.security_core_medium_open_incidents') | int(0) %}
          {% set open_inc = states('sensor.security_core_open_incidents') | int(0) %}
          {% set quarantine = states('sensor.security_core_quarantined_devices') | int(0) %}
          {% set blocked = states('sensor.security_core_internet_blocked_devices') | int(0) %}
          {% set unknown = states('sensor.security_core_unknown_devices') | int(0) %}
          {% set at_risk = states('sensor.security_core_at_risk_devices') | int(0) %}
          {% set kev_devices = states('sensor.security_core_kev_devices') | int(0) %}
          {% set critical_risk_devices = states('sensor.security_core_critical_risk_devices') | int(0) %}
          {% set kev_matches = states('sensor.security_core_kev_matches') | int(0) %}
          {% set score = critical_inc * 35 + high_inc * 22 + med_inc * 8 + open_inc * 2 + quarantine * 10 + blocked * 7 + unknown * 3 + at_risk * 8 + kev_devices * 14 + critical_risk_devices * 16 + kev_matches * 5 %}
          {{ [score, 100] | min | round(0) }}

      - name: "Security Core Main Risk Level"
        unique_id: security_core_main_risk_level
        icon: mdi:shield-alert-outline
        state: >-
          {% set risk = states('sensor.security_core_main_risk_index') | int(0) %}
          {% if risk >= 80 %}critical
          {% elif risk >= 55 %}high
          {% elif risk >= 30 %}medium
          {% elif risk >= 10 %}low
          {% else %}normal
          {% endif %}

      - name: "Security Core Main Online Ratio"
        unique_id: security_core_main_online_ratio
        icon: mdi:lan-connect
        unit_of_measurement: "%"
        state: >-
          {% set total = states('sensor.security_core_total_devices') | int(0) %}
          {% set online = states('sensor.security_core_online_devices') | int(0) %}
          {{ ((online / total) * 100) | round(1) if total > 0 else 0 }}

      - name: "Security Core Main Confirmed Ratio"
        unique_id: security_core_main_confirmed_ratio
        icon: mdi:check-decagram
        unit_of_measurement: "%"
        state: >-
          {% set total = states('sensor.security_core_total_devices') | int(0) %}
          {% set confirmed = states('sensor.security_core_confirmed_devices') | int(0) %}
          {% if confirmed == 0 and states('sensor.security_core_confirmed_devices_2') not in ['unknown','unavailable',''] %}
            {% set confirmed = states('sensor.security_core_confirmed_devices_2') | int(0) %}
          {% endif %}
          {{ ((confirmed / total) * 100) | round(1) if total > 0 else 0 }}

      - name: "Security Core Main Active Countries 24h"
        unique_id: security_core_main_active_countries_24h
        icon: mdi:earth
        state: >-
          {% set geo = state_attr('sensor.security_core_main_geo_communications_raw', 'items') or state_attr('sensor.security_core_geo_communications_raw', 'items') or [] %}
          {% if geo | length > 0 %}
            {{ geo | length }}
          {% else %}
            {{ states('sensor.security_core_opnsense_flow_countries_last_24h') | int(0) }}
          {% endif %}

      - name: "Security Core Main Traffic MB 24h"
        unique_id: security_core_main_traffic_mb_24h
        icon: mdi:chart-bell-curve-cumulative
        unit_of_measurement: "MB"
        state: >-
          {% set geo = state_attr('sensor.security_core_main_geo_communications_raw', 'items') or state_attr('sensor.security_core_geo_communications_raw', 'items') or [] %}
          {% set ns = namespace(total=0) %}
          {% for item in geo %}
            {% set ns.total = ns.total + (item.get('bytes_total') | int(0)) %}
          {% endfor %}
          {% if ns.total == 0 %}
            {% set ns.total = states('sensor.security_core_opnsense_flow_bytes_last_24h') | int(0) %}
          {% endif %}
          {{ (ns.total / 1024 / 1024) | round(2) }}

      - name: "Security Core Main Top Country"
        unique_id: security_core_main_top_country
        icon: mdi:flag
        state: >-
          {% set items = state_attr('sensor.security_core_main_geo_communications_raw', 'items') or state_attr('sensor.security_core_geo_communications_raw', 'items') or [] %}
          {% if items | length == 0 %}
            unknown
          {% else %}
            {{ (items | sort(attribute='bytes_total', reverse=true))[0].get('country_code', 'unknown') }}
          {% endif %}

      - name: "Security Core Main Top Country MB"
        unique_id: security_core_main_top_country_mb
        icon: mdi:cloud-download
        unit_of_measurement: "MB"
        state: >-
          {% set items = state_attr('sensor.security_core_main_geo_communications_raw', 'items') or state_attr('sensor.security_core_geo_communications_raw', 'items') or [] %}
          {% if items | length == 0 %}
            0
          {% else %}
            {{ (((items | sort(attribute='bytes_total', reverse=true))[0].get('bytes_total') | int(0)) / 1024 / 1024) | round(2) }}
          {% endif %}

      - name: "Security Core Main DNS Summary Rows"
        unique_id: security_core_main_dns_summary_rows
        icon: mdi:dns
        state: >-
          {{ (state_attr('sensor.security_core_main_dns_summary_raw','items') or state_attr('sensor.security_core_dns_summary_raw','items') or []) | length }}

      - name: "Security Core Main System Health Rows"
        unique_id: security_core_main_system_health_rows
        icon: mdi:server-network
        state: >-
          {{ (state_attr('sensor.security_core_main_system_health_raw','items') or state_attr('sensor.security_core_main_health_extended_raw','components') or state_attr('sensor.security_core_system_health_raw','items') or []) | length }}

      - name: "Security Core Main System Degraded Components"
        unique_id: security_core_main_system_degraded_components
        icon: mdi:server-network
        state: >-
          {% set items = state_attr('sensor.security_core_main_system_health_raw', 'items') or state_attr('sensor.security_core_main_health_extended_raw', 'components') or state_attr('sensor.security_core_system_health_raw', 'items') or [] %}
          {% set ns = namespace(count=0) %}
          {% for item in items %}
            {% set status = (item.get('status') or '') | lower %}
            {% if status in ['degraded', 'warning', 'failed', 'critical', 'error', 'unhealthy'] %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}


      - name: "Security Core Main System Healthy Components"
        unique_id: security_core_main_system_healthy_components
        icon: mdi:check-network
        state: >-
          {% set items = state_attr('sensor.security_core_main_system_health_raw', 'items') or state_attr('sensor.security_core_main_health_extended_raw', 'components') or state_attr('sensor.security_core_system_health_raw', 'items') or [] %}
          {% set ns = namespace(count=0) %}
          {% for item in items %}
            {% set status = (item.get('status') or '') | lower %}
            {% if status in ['healthy', 'ok'] %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}

      - name: "Security Core Main System Problem Components"
        unique_id: security_core_main_system_problem_components
        icon: mdi:alert-circle
        state: >-
          {% set items = state_attr('sensor.security_core_main_system_health_raw', 'items') or state_attr('sensor.security_core_main_health_extended_raw', 'components') or state_attr('sensor.security_core_system_health_raw', 'items') or [] %}
          {% set ns = namespace(count=0) %}
          {% for item in items %}
            {% set status = (item.get('status') or 'unknown') | lower %}
            {% if status not in ['healthy', 'ok'] %}
              {% set ns.count = ns.count + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.count }}

      - name: "Security Core Main System Last Check"
        unique_id: security_core_main_system_last_check
        icon: mdi:clock-check-outline
        state: >-
          {% set items = state_attr('sensor.security_core_main_system_health_raw', 'items') or state_attr('sensor.security_core_main_health_extended_raw', 'components') or state_attr('sensor.security_core_system_health_raw', 'items') or [] %}
          {% set ns = namespace(values=[]) %}
          {% for item in items %}
            {% set ts = item.get('last_check_at') or item.get('check_at') or item.get('updated_at') %}
            {% if ts %}
              {% set ns.values = ns.values + [ts] %}
            {% endif %}
          {% endfor %}
          {{ (ns.values | sort | last) if ns.values | length > 0 else 'unknown' }}

      - name: "Security Core Main Status"
        unique_id: security_core_main_status
        icon: mdi:shield-check
        state: >-
          {% set api = states('sensor.security_core_api_health') | lower %}
          {% set db = states('sensor.security_core_db_health') | lower %}
          {% set degraded = states('sensor.security_core_main_system_degraded_components') | int(0) %}
          {% set risk = states('sensor.security_core_main_risk_level') | lower %}
          {% if api not in ['healthy', 'ok'] or db not in ['healthy', 'ok'] or risk == 'critical' %}
            critical
          {% elif degraded > 0 or risk == 'high' %}
            degraded
          {% elif risk == 'medium' %}
            watch
          {% else %}
            healthy
          {% endif %}
        attributes:
          api: "{{ states('sensor.security_core_api_health') }}"
          database: "{{ states('sensor.security_core_db_health') }}"
          degraded_components: "{{ states('sensor.security_core_main_system_degraded_components') }}"
          risk_level: "{{ states('sensor.security_core_main_risk_level') }}"
          system_health_rows: "{{ states('sensor.security_core_main_system_health_rows') }}"
          dns_summary_rows: "{{ states('sensor.security_core_main_dns_summary_rows') }}"


# Top country location sensors for native Home Assistant map card.
