  - title: Aptikimas ir incidentai
    path: aptikimas-incidentai
    type: sections
    max_columns: 4
    top_margin: false
    dense_section_placement: true
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Aptikimo ir incidentų apžvalga
            heading_style: title
          - type: markdown
            content: >-
              **Aptikimų ir incidentų valdymo centras**

              Šiame puslapyje rodomi DNS filtravimo sistemos, ĮAS/ĮPS, anomalijų
              sistemos įvykiai ir aptikimai. "Patvirtinti incidentą" mygtukas
              reiškia, kad administratorius incidentą peržiūrėjo ir priėmė
              tyrimui. Incidentas lieka aktyvus, bet jo būsena tampa
              `acknowledged`. Uždaryti incidentą mygtukas reiškia, kad
              incidentas sutvarkytas arba nebeaktualus.
          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: sensor.security_core_active_incidents
                name: Aktyvūs incidentai
                icon: mdi:alert-circle-outline
                color: red
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Aktyvūs incidentai
                      content:
                        type: markdown
                        content: >-
                          {% set items =
                          state_attr('sensor.security_core_incidents_raw',
                          'items') or [] %} {% set ns = namespace(rows=[]) %} {%
