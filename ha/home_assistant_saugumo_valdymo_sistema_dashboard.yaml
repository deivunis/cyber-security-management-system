          - type: markdown
            content: >-
              **Audito valdymo centras**

              Šis skyrius skirtas sistemos auditui, pranešimams, ataskaitoms,
              eksportams ir PCAP fiksavimui.

              Paspaudus ant kortelių atsidarys sąrašas su tos kortelės
              duomenimis. Ataskaitas ir PCAP galima pasirinkti iš sąrašo.
              Pasirinkus konkretų įrenginį, jam galima pradėti srauto įrašymo
              procesą ir vėliau atsisiųsti PCAP formatu.
          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: sensor.security_core_audit_events_24h
                name: Audito įrašai 24h
                color: blue
