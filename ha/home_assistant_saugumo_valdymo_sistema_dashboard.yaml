                            {% endif %}
                          {% endfor %} {{ ns.rows[:80] | join('<br>') if ns.rows
                          | length > 0 else '_Aktyvių ignoravimų nėra._' }}
              - type: tile
                entity: sensor.security_core_device_response_overrides
