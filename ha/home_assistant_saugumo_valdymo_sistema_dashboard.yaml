              Šiame puslapyje matai, kiek yra siūlomų, aktyvių, atšauktų ir
              ignoruojamų veiksmų. Kairėje gali valdyti bendrą sistemos režimą,
              viduryje pasirenki incidentą ir iš karto vykdai arba atšauki
              veiksmą.
          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: sensor.security_core_response_suggested_actions
                name: Siūlomi veiksmai
                icon: mdi:lightbulb-alert
                color: amber
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Siūlomi veiksmai
                      content:
                        type: markdown
                        content: >-
                          {% set items =
                          state_attr('sensor.security_core_response_actions_raw',
                          'items') or [] %} {% set ns = namespace(rows=[]) %} {%
                          for item in items %}
                            {% if item.get('status') == 'suggested' %}
                              {% set action = item.get('action_type') or 'unknown' %}
                              {% set dev = item.get('device_hostname') or item.get('device_ip') or 'no-device' %}
                              {% set title = item.get('incident_title') or item.get('incident_type') or 'incident' %}
                              {% set exp = item.get('expires_at') or '-' %}
                              {% set ns.rows = ns.rows + ['**' ~ action ~ '** | ' ~ dev ~ ' | **' ~ title ~ '** | iki: `' ~ exp ~ '`'] %}
                            {% endif %}
                          {% endfor %} {{ ns.rows[:80] | join('<br>') if ns.rows
                          | length > 0 else '_Siūlomų veiksmų nėra._' }}
              - type: tile
                entity: sensor.security_core_response_active_actions
                name: Aktyvūs veiksmai
                icon: mdi:shield-check
                color: green
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
