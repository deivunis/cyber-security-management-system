                        type: markdown
                        content: >-
                          {% set items =
                          state_attr('sensor.security_core_response_actions_raw',
                          'items') or [] %} {% set active =
                          ['active','applied','applied_degraded','pending','approved']
                          %} {% set ns = namespace(rows=[]) %} {% for item in
                          items %}
                            {% if item.get('status') in active %}
                              {% set action = item.get('action_type') or 'unknown' %}
                              {% set status = item.get('status') or 'unknown' %}
                              {% set dev = item.get('device_hostname') or item.get('device_ip') or 'no-device' %}
                              {% set title = item.get('incident_title') or item.get('incident_type') or 'incident' %}
                              {% set exp = item.get('expires_at') or '-' %}
                              {% set ns.rows = ns.rows + ['**' ~ action ~ '** | `' ~ status ~ '` | ' ~ dev ~ ' | **' ~ title ~ '** | iki: `' ~ exp ~ '`'] %}
                            {% endif %}
                          {% endfor %} {{ ns.rows[:80] | join('<br>') if ns.rows
                          | length > 0 else '_Aktyvių veiksmų nėra._' }}
              - type: tile
