                            {% set pref = item.get('preferred_action') or '-' %}
                            {% set until = item.get('suppress_until') or '-' %}
                            {% set notes = item.get('notes') or '' %}
                            {% set ns.rows = ns.rows + ['**' ~ device ~ '** | `' ~ ip ~ '` | auto-response: **' ~ enabled ~ '** | max: `' ~ maxa ~ '` | pageid.: `' ~ pref ~ '` | iki: `' ~ until ~ '`' ~ ((' | ' ~ notes) if notes else '')] %}
                          {% endfor %} {{ ns.rows[:100] | join('<br>') if
                          ns.rows | length > 0 else '_Įrenginių override nėra._'
                          }}
              - type: tile
                entity: sensor.security_core_active_dns_only_responses
                name: Aktyvūs DNS-only
                icon: mdi:dns-outline
                color: cyan
                tap_action:
