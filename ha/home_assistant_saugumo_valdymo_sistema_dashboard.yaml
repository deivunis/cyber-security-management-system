                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Audito įrašai
                      content:
                        type: markdown
                        content: >-
                          {% set items =
                          state_attr('sensor.security_core_audit_events_raw','items')
                          or [] %} {% if items | length == 0 %} _Audito įrašų
                          nėra arba jie dar neįkelti._ {% else %} {% set ns =
                          namespace(lines=[]) %} {% for item in items[:30] %}
                            {% set event = item.get('event_type','event') %}
                            {% set actor = item.get('actor_name','-') %}
                            {% set actor_type = item.get('actor_type','-') %}
                            {% set target = item.get('target_type','-') %}
                            {% set target_id = item.get('target_id','-') %}
                            {% set time = item.get('event_time','-') %}
                            {% set ns.lines = ns.lines + ['**' ~ event ~ '** | `' ~ time ~ '`  \n' ~ actor_type ~ ': `' ~ actor ~ '` | target: `' ~ target ~ '` | `' ~ target_id ~ '`'] %}
                          {% endfor %} {{ ns.lines | join('\n\n') }} {% endif %}
              - type: tile
                entity: sensor.security_core_notifications_24h
                name: Pranešimai 24h
                color: purple
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Pranešimai per paskutines 24 h
                      content:
                        type: markdown
                        content: >-
                          {% set items =
