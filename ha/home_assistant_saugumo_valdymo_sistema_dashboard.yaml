views:
  - title: Pagrindinis
    path: pagrindinis
    type: sections
    max_columns: 4
    top_margin: true
    dense_section_placement: false
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: heading
            heading: Pasaulio srauto žemėlapis
            heading_style: title
          - type: iframe
            url: >-
              /local/security-core/security-core-country-map.html?v=20260505-fix8
            aspect_ratio: 42%
            grid_options:
              columns: full
              rows: 8
      - type: grid
        cards:
          - type: heading
            heading: Bendra sistemos būklė
            heading_style: title
          - type: gauge
            entity: sensor.security_core_main_risk_index
            name: Bendras rizikos indeksas
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 30
              red: 70
            tap_action:
              action: more-info
          - type: tile
            entity: sensor.security_core_main_status
            name: SOC būsena
            icon: mdi:shield-check
            vertical: true
            color: primary
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: SOC būsenos detalės
                  size: wide
                  content:
                    type: markdown
                    content: >-
                      **SOC būsena:** `{{
                      states('sensor.security_core_main_status') }}`  

                      **Rizikos lygis:** `{{
                      states('sensor.security_core_main_risk_level') }}`  

                      **Rizikos indeksas:** `{{
                      states('sensor.security_core_main_risk_index') }}%`  

                      **Degraduoti komponentai:** `{{
                      states('sensor.security_core_main_system_degraded_components')
                      }}`
            hold_action:
              action: more-info
          - type: tile
            entity: sensor.security_core_api_health
            name: API
            icon: mdi:api
            vertical: true
            color: green
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: API detalės
                  size: wide
                  content:
                    type: markdown
                    content: >-
                      **API health:** `{{
                      states('sensor.security_core_api_health') }}`  

                      Backend: `http://REDACTED/health`
            hold_action:
              action: more-info
          - type: tile
            entity: sensor.security_core_db_health
            name: Duomenų bazė
            icon: mdi:database-check
            vertical: true
            color: green
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: Duomenų bazės detalės
                  size: wide
                  content:
                    type: markdown
                    content: >-
                      **DB health:** `{{
                      states('sensor.security_core_db_health') }}`  

                      Šis indikatorius ateina iš Security Core `/health`
                      endpointo.
            hold_action:
              action: more-info
          - type: tile
            entity: sensor.security_core_main_system_health_rows
            name: Komponentai
            icon: mdi:server-network
            vertical: true
            color: primary
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: Security Core komponentai
                  size: wide
                  content:
                    type: markdown
                    content: >-
                      {% set items =
                      state_attr('sensor.security_core_main_system_health_raw',
                      'items') or
                      state_attr('sensor.security_core_main_health_extended_raw',
                      'components') or
                      state_attr('sensor.security_core_system_health_raw',
                      'items') or [] %}

                      {% if items | length == 0 %}

                      _Komponentų sąrašo dar nėra. Patikrink
                      `/api/v1/system-health` arba `/health` endpointą ir
                      `sensor.security_core_main_system_health_raw` /
                      `sensor.security_core_main_health_extended_raw`
                      atributus._

                      {% else %}

                      {% set ns = namespace(lines=[]) %}

                      {% for item in items %}
                        {% set name = item.get('component_name','unknown') %}
                        {% set typ = item.get('component_type','-') %}
                        {% set status = item.get('status','unknown') %}
                        {% set version = item.get('version','') %}
                        {% set check = item.get('last_check_at') or item.get('check_at') or item.get('updated_at') or '' %}
                        {% set ns.lines = ns.lines + ['**' ~ name ~ '** · `' ~ status ~ '` · ' ~ typ ~ ((' · ' ~ version) if version else '') ~ '  <br><small>' ~ check ~ '</small>'] %}
                      {% endfor %}

                      {{ ns.lines | join('<br><br>') }}

                      {% endif %}
            hold_action:
              action: more-info
          - type: tile
            entity: sensor.security_core_main_system_healthy_components
            name: Sveiki komponentai
            icon: mdi:check-network
            vertical: true
            color: green
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: Sveiki komponentai
                  size: wide
                  content:
                    type: markdown
                    content: >-
                      {% set items =
                      state_attr('sensor.security_core_main_system_health_raw',
                      'items') or
                      state_attr('sensor.security_core_main_health_extended_raw',
                      'components') or
                      state_attr('sensor.security_core_system_health_raw',
                      'items') or [] %}

                      {% set ns = namespace(lines=[]) %}

                      {% for item in items %}
                        {% set status = (item.get('status') or '') | lower %}
                        {% if status in ['healthy','ok'] %}
                          {% set ns.lines = ns.lines + ['**' ~ item.get('component_name','unknown') ~ '** · `' ~ item.get('status','unknown') ~ '` · ' ~ item.get('component_type','-')] %}
                        {% endif %}
                      {% endfor %}

                      {{ ns.lines | join('<br>') if ns.lines | length > 0 else
                      '_Sveikų komponentų nėra arba duomenys dar neįkelti._' }}
            hold_action:
              action: more-info
          - type: tile
            entity: sensor.security_core_main_system_problem_components
            name: Probleminiai komponentai
            icon: mdi:alert-circle
            vertical: true
            color: red
            tap_action:
              action: fire-dom-event
              browser_mod:
                service: browser_mod.popup
                data:
                  title: Probleminiai komponentai
                  size: wide
                  content:
                    type: markdown
                    content: >-
                      {% set items =
                      state_attr('sensor.security_core_main_system_health_raw',
                      'items') or
                      state_attr('sensor.security_core_main_health_extended_raw',
                      'components') or
                      state_attr('sensor.security_core_system_health_raw',
                      'items') or [] %}

                      {% set bad =
                      ['degraded','warning','failed','critical','error','unhealthy','unknown']
                      %}

                      {% set ns = namespace(lines=[]) %}

                      {% for item in items %}
                        {% set status = (item.get('status') or 'unknown') | lower %}
                        {% if status in bad %}
                          {% set check = item.get('last_check_at') or item.get('check_at') or item.get('updated_at') or '' %}
                          {% set ns.lines = ns.lines + ['**' ~ item.get('component_name','unknown') ~ '** · `' ~ item.get('status','unknown') ~ '` · ' ~ item.get('component_type','-') ~ '  <br><small>' ~ check ~ '</small>'] %}
                        {% endif %}
                      {% endfor %}

                      {{ ns.lines | join('<br><br>') if ns.lines | length > 0
                      else '_Probleminių komponentų nėra._' }}
            hold_action:
              action: more-info
      - type: grid
        cards:
          - type: heading
            heading: Įrenginiai ir politika
            heading_style: title
          - type: grid
            square: false
            columns: 2
            cards:
              - type: tile
                entity: sensor.security_core_total_devices
                name: Viso įrenginių
                icon: mdi:devices
                vertical: true
                color: primary
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Visi įrenginiai
                      size: wide
                      content:
                        type: markdown
                        content: |2-
                              {% set items = state_attr('sensor.security_core_main_inventory_raw','items') or state_attr('sensor.security_core_inventory_raw','items') or [] %}
                              {% set q_rows = state_attr('sensor.opnsense_quarantine_list','rows') or [] %}
                              {% set b_rows = state_attr('sensor.opnsense_internet_block_list','rows') or [] %}
                              {% set q = namespace(ips=[]) %}
                              {% set b = namespace(ips=[]) %}
                              {% for row in q_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set q.ips = q.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% for row in b_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set b.ips = b.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% set ns = namespace(rows=[]) %}
                              {% for item in items %}
                                {% set ip = item.get('current_ip') or 'no-ip' %}
                                {% set mode = item.get('policy_effective_mode') or item.get('status') or 'unknown' %}
                                {% set category = item.get('category') or 'unknown' %}
                                {% set name = item.get('hostname') or item.get('vendor') or item.get('mac_address') or 'unknown-device' %}
                                {% set online = 'ONLINE' if item.get('is_online') else 'OFFLINE' %}
                                {% set confirm = 'PATVIRTINTAS' if item.get('identity_confirmed') else 'NEPATVIRTINTAS' %}
                                {% set cve = item.get('vulnerability_count') or 0 %}
                                {% set kev = item.get('kev_count') or 0 %}
                                {% set cvss = item.get('highest_cvss') or 0 %}
                                {% set risk = item.get('risk_score') or 0 %}
                                {% if true %}
                                  {% set ns.rows = ns.rows + ['**' ~ name ~ '** | ' ~ online ~ ' | ' ~ confirm ~ ' | `' ~ ip ~ '` | `' ~ category ~ '` | mode: `' ~ mode ~ '` | CVE: ' ~ cve ~ ' | KEV: ' ~ kev ~ ' | CVSS: ' ~ cvss ~ ' | risk: ' ~ risk] %}
                                {% endif %}
                              {% endfor %}
                              {% if ns.rows | length == 0 %}
                              _Įrenginių nėra._
                              {% else %}
                              {{ ns.rows | join('<br>') }}
                              {% endif %}
                hold_action:
                  action: more-info
              - type: tile
                entity: sensor.security_core_online_devices
                name: Prisijungę
                icon: mdi:lan-connect
                vertical: true
                color: green
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Prisijungę įrenginiai
                      size: wide
                      content:
                        type: markdown
                        content: |2-
                              {% set items = state_attr('sensor.security_core_main_inventory_raw','items') or state_attr('sensor.security_core_inventory_raw','items') or [] %}
                              {% set q_rows = state_attr('sensor.opnsense_quarantine_list','rows') or [] %}
                              {% set b_rows = state_attr('sensor.opnsense_internet_block_list','rows') or [] %}
                              {% set q = namespace(ips=[]) %}
                              {% set b = namespace(ips=[]) %}
                              {% for row in q_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set q.ips = q.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% for row in b_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set b.ips = b.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% set ns = namespace(rows=[]) %}
                              {% for item in items %}
                                {% set ip = item.get('current_ip') or 'no-ip' %}
                                {% set mode = item.get('policy_effective_mode') or item.get('status') or 'unknown' %}
                                {% set category = item.get('category') or 'unknown' %}
                                {% set name = item.get('hostname') or item.get('vendor') or item.get('mac_address') or 'unknown-device' %}
                                {% set online = 'ONLINE' if item.get('is_online') else 'OFFLINE' %}
                                {% set confirm = 'PATVIRTINTAS' if item.get('identity_confirmed') else 'NEPATVIRTINTAS' %}
                                {% set cve = item.get('vulnerability_count') or 0 %}
                                {% set kev = item.get('kev_count') or 0 %}
                                {% set cvss = item.get('highest_cvss') or 0 %}
                                {% set risk = item.get('risk_score') or 0 %}
                                {% if item.get('is_online') %}
                                  {% set ns.rows = ns.rows + ['**' ~ name ~ '** | ' ~ online ~ ' | ' ~ confirm ~ ' | `' ~ ip ~ '` | `' ~ category ~ '` | mode: `' ~ mode ~ '` | CVE: ' ~ cve ~ ' | KEV: ' ~ kev ~ ' | CVSS: ' ~ cvss ~ ' | risk: ' ~ risk] %}
                                {% endif %}
                              {% endfor %}
                              {% if ns.rows | length == 0 %}
                              _Prisijungusių įrenginių nėra._
                              {% else %}
                              {{ ns.rows | join('<br>') }}
                              {% endif %}
                hold_action:
                  action: more-info
              - type: tile
                entity: sensor.security_core_offline_devices
                name: Atsijungę
                icon: mdi:lan-disconnect
                vertical: true
                color: amber
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Atsijungę įrenginiai
                      size: wide
                      content:
                        type: markdown
                        content: |2-
                              {% set items = state_attr('sensor.security_core_main_inventory_raw','items') or state_attr('sensor.security_core_inventory_raw','items') or [] %}
                              {% set q_rows = state_attr('sensor.opnsense_quarantine_list','rows') or [] %}
                              {% set b_rows = state_attr('sensor.opnsense_internet_block_list','rows') or [] %}
                              {% set q = namespace(ips=[]) %}
                              {% set b = namespace(ips=[]) %}
                              {% for row in q_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set q.ips = q.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% for row in b_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set b.ips = b.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% set ns = namespace(rows=[]) %}
                              {% for item in items %}
                                {% set ip = item.get('current_ip') or 'no-ip' %}
                                {% set mode = item.get('policy_effective_mode') or item.get('status') or 'unknown' %}
                                {% set category = item.get('category') or 'unknown' %}
                                {% set name = item.get('hostname') or item.get('vendor') or item.get('mac_address') or 'unknown-device' %}
                                {% set online = 'ONLINE' if item.get('is_online') else 'OFFLINE' %}
                                {% set confirm = 'PATVIRTINTAS' if item.get('identity_confirmed') else 'NEPATVIRTINTAS' %}
                                {% set cve = item.get('vulnerability_count') or 0 %}
                                {% set kev = item.get('kev_count') or 0 %}
                                {% set cvss = item.get('highest_cvss') or 0 %}
                                {% set risk = item.get('risk_score') or 0 %}
                                {% if not item.get('is_online') %}
                                  {% set ns.rows = ns.rows + ['**' ~ name ~ '** | ' ~ online ~ ' | ' ~ confirm ~ ' | `' ~ ip ~ '` | `' ~ category ~ '` | mode: `' ~ mode ~ '` | CVE: ' ~ cve ~ ' | KEV: ' ~ kev ~ ' | CVSS: ' ~ cvss ~ ' | risk: ' ~ risk] %}
                                {% endif %}
                              {% endfor %}
                              {% if ns.rows | length == 0 %}
                              _Atsijungusių įrenginių nėra._
                              {% else %}
                              {{ ns.rows | join('<br>') }}
                              {% endif %}
                hold_action:
                  action: more-info
              - type: tile
                entity: sensor.security_core_quarantined_devices
                name: Karantine
                icon: mdi:shield-lock
                vertical: true
                color: red
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Karantinuoti įrenginiai
                      size: wide
                      content:
                        type: markdown
                        content: |2-
                              {% set items = state_attr('sensor.security_core_main_inventory_raw','items') or state_attr('sensor.security_core_inventory_raw','items') or [] %}
                              {% set q_rows = state_attr('sensor.opnsense_quarantine_list','rows') or [] %}
                              {% set b_rows = state_attr('sensor.opnsense_internet_block_list','rows') or [] %}
                              {% set q = namespace(ips=[]) %}
                              {% set b = namespace(ips=[]) %}
                              {% for row in q_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set q.ips = q.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% for row in b_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set b.ips = b.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% set ns = namespace(rows=[]) %}
                              {% for item in items %}
                                {% set ip = item.get('current_ip') or 'no-ip' %}
                                {% set mode = item.get('policy_effective_mode') or item.get('status') or 'unknown' %}
                                {% set category = item.get('category') or 'unknown' %}
                                {% set name = item.get('hostname') or item.get('vendor') or item.get('mac_address') or 'unknown-device' %}
                                {% set online = 'ONLINE' if item.get('is_online') else 'OFFLINE' %}
                                {% set confirm = 'PATVIRTINTAS' if item.get('identity_confirmed') else 'NEPATVIRTINTAS' %}
                                {% set cve = item.get('vulnerability_count') or 0 %}
                                {% set kev = item.get('kev_count') or 0 %}
                                {% set cvss = item.get('highest_cvss') or 0 %}
                                {% set risk = item.get('risk_score') or 0 %}
                                {% if ip in q.ips or item.get('status') == 'quarantined' or item.get('policy_effective_mode') == 'quarantine' %}
                                  {% set ns.rows = ns.rows + ['**' ~ name ~ '** | ' ~ online ~ ' | ' ~ confirm ~ ' | `' ~ ip ~ '` | `' ~ category ~ '` | mode: `' ~ mode ~ '` | CVE: ' ~ cve ~ ' | KEV: ' ~ kev ~ ' | CVSS: ' ~ cvss ~ ' | risk: ' ~ risk] %}
                                {% endif %}
                              {% endfor %}
                              {% if ns.rows | length == 0 %}
                              _Karantinuotų įrenginių nėra._
                              {% else %}
                              {{ ns.rows | join('<br>') }}
                              {% endif %}
                hold_action:
                  action: more-info
              - type: tile
                entity: sensor.security_core_internet_blocked_devices
                name: Be interneto
                icon: mdi:web-off
                vertical: true
                color: red
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Įrenginiai be interneto
                      size: wide
                      content:
                        type: markdown
                        content: |2-
                              {% set items = state_attr('sensor.security_core_main_inventory_raw','items') or state_attr('sensor.security_core_inventory_raw','items') or [] %}
                              {% set q_rows = state_attr('sensor.opnsense_quarantine_list','rows') or [] %}
                              {% set b_rows = state_attr('sensor.opnsense_internet_block_list','rows') or [] %}
                              {% set q = namespace(ips=[]) %}
                              {% set b = namespace(ips=[]) %}
                              {% for row in q_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set q.ips = q.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% for row in b_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set b.ips = b.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% set ns = namespace(rows=[]) %}
                              {% for item in items %}
                                {% set ip = item.get('current_ip') or 'no-ip' %}
                                {% set mode = item.get('policy_effective_mode') or item.get('status') or 'unknown' %}
                                {% set category = item.get('category') or 'unknown' %}
                                {% set name = item.get('hostname') or item.get('vendor') or item.get('mac_address') or 'unknown-device' %}
                                {% set online = 'ONLINE' if item.get('is_online') else 'OFFLINE' %}
                                {% set confirm = 'PATVIRTINTAS' if item.get('identity_confirmed') else 'NEPATVIRTINTAS' %}
                                {% set cve = item.get('vulnerability_count') or 0 %}
                                {% set kev = item.get('kev_count') or 0 %}
                                {% set cvss = item.get('highest_cvss') or 0 %}
                                {% set risk = item.get('risk_score') or 0 %}
                                {% if ip in b.ips or item.get('status') == 'blocked_internet' or item.get('policy_effective_mode') == 'blocked_internet' %}
                                  {% set ns.rows = ns.rows + ['**' ~ name ~ '** | ' ~ online ~ ' | ' ~ confirm ~ ' | `' ~ ip ~ '` | `' ~ category ~ '` | mode: `' ~ mode ~ '` | CVE: ' ~ cve ~ ' | KEV: ' ~ kev ~ ' | CVSS: ' ~ cvss ~ ' | risk: ' ~ risk] %}
                                {% endif %}
                              {% endfor %}
                              {% if ns.rows | length == 0 %}
                              _Įrenginių be interneto nėra._
                              {% else %}
                              {{ ns.rows | join('<br>') }}
                              {% endif %}
                hold_action:
                  action: more-info
              - type: tile
                entity: sensor.security_core_dns_only_devices
                name: Tik DNS
                icon: mdi:dns
                vertical: true
                color: blue
                tap_action:
                  action: fire-dom-event
                  browser_mod:
                    service: browser_mod.popup
                    data:
                      title: Tik DNS režimo įrenginiai
                      size: wide
                      content:
                        type: markdown
                        content: |2-
                              {% set items = state_attr('sensor.security_core_main_inventory_raw','items') or state_attr('sensor.security_core_inventory_raw','items') or [] %}
                              {% set q_rows = state_attr('sensor.opnsense_quarantine_list','rows') or [] %}
                              {% set b_rows = state_attr('sensor.opnsense_internet_block_list','rows') or [] %}
                              {% set q = namespace(ips=[]) %}
                              {% set b = namespace(ips=[]) %}
                              {% for row in q_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set q.ips = q.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% for row in b_rows %}
                                {% set ip = row.get('address') or row.get('ip') or row.get('name') %}
                                {% if ip %}{% set b.ips = b.ips + [ip] %}{% endif %}
                              {% endfor %}
                              {% set ns = namespace(rows=[]) %}
                              {% for item in items %}
                                {% set ip = item.get('current_ip') or 'no-ip' %}
                                {% set mode = item.get('policy_effective_mode') or item.get('status') or 'unknown' %}
                                {% set category = item.get('category') or 'unknown' %}
                                {% set name = item.get('hostname') or item.get('vendor') or item.get('mac_address') or 'unknown-device' %}
                                {% set online = 'ONLINE' if item.get('is_online') else 'OFFLINE' %}
                                {% set confirm = 'PATVIRTINTAS' if item.get('identity_confirmed') else 'NEPATVIRTINTAS' %}
                                {% set cve = item.get('vulnerability_count') or 0 %}
                                {% set kev = item.get('kev_count') or 0 %}
                                {% set cvss = item.get('highest_cvss') or 0 %}
                                {% set risk = item.get('risk_score') or 0 %}
                                {% if item.get('status') == 'dns_only' or item.get('policy_effective_mode') == 'dns_only' %}
                                  {% set ns.rows = ns.rows + ['**' ~ name ~ '** | ' ~ online ~ ' | ' ~ confirm ~ ' | `' ~ ip ~ '` | `' ~ category ~ '` | mode: `' ~ mode ~ '` | CVE: ' ~ cve ~ ' | KEV: ' ~ kev ~ ' | CVSS: ' ~ cvss ~ ' | risk: ' ~ risk] %}
                                {% endif %}
                              {% endfor %}
                              {% if ns.rows | length == 0 %}
                              _Tik DNS režimo įrenginių nėra._
                              {% else %}
                              {{ ns.rows | join('<br>') }}
                              {% endif %}
                hold_action:
                  action: more-info
          - type: entities
            title: Įrenginių būsena
            state_color: true
            entities:
              - entity: sensor.security_core_main_online_ratio
                name: Online įrenginių dalis
              - entity: sensor.security_core_main_confirmed_ratio
                name: Patvirtintų įrenginių dalis
              - entity: sensor.security_core_unknown_devices
                name: Neklasifikuoti įrenginiai
                tap_action:
