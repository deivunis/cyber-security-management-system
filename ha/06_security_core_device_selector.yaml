script:
  security_core_refresh_dashboard_entities:
    alias: "Security Core Refresh Dashboard Entities"
    mode: restart
    sequence:
      - service: homeassistant.update_entity
        target:
          entity_id:
            - sensor.security_core_inventory_raw
            - sensor.security_core_total_devices
            - sensor.security_core_online_devices
            - sensor.security_core_offline_devices
            - sensor.security_core_quarantined_devices
            - sensor.security_core_internet_blocked_devices
            - sensor.security_core_dns_only_devices
            - sensor.security_core_unknown_devices
            - sensor.security_core_confirmed_devices
            - sensor.security_core_unconfirmed_devices
            - sensor.security_core_at_risk_devices
            - sensor.security_core_kev_devices
            - sensor.security_core_critical_risk_devices
            - sensor.security_core_open_vulnerability_matches
            - sensor.security_core_kev_matches
            - sensor.security_core_affected_devices
            - sensor.security_core_highest_cvss
            - sensor.opnsense_quarantine_list
            - sensor.opnsense_internet_block_list

  security_core_internet_block_selected_add_fast:
    alias: "Security Core Internet Block Selected Fast Add"
    mode: restart
    sequence:
      - variables:
          ip: "{{ states('sensor.security_core_selected_pretty_device_ip') }}"
      - condition: template
        value_template: "{{ ip not in ['unknown', '', none] }}"
      - service: script.internet_block_add
        data:
          ip: "{{ ip }}"
      - delay: "00:00:01"
      - service: script.security_core_refresh_dashboard_entities
      - delay: "00:00:02"
      - service: script.security_core_refresh_dashboard_entities

  security_core_internet_block_selected_remove_fast:
    alias: "Security Core Internet Block Selected Fast Remove"
    mode: restart
    sequence:
      - variables:
          ip: "{{ states('sensor.security_core_selected_pretty_device_ip') }}"
      - condition: template
        value_template: "{{ ip not in ['unknown', '', none] }}"
      - service: script.internet_block_remove
        data:
          ip: "{{ ip }}"
      - delay: "00:00:01"
      - service: script.security_core_refresh_dashboard_entities
      - delay: "00:00:02"
      - service: script.security_core_refresh_dashboard_entities

  security_core_quarantine_selected_add_fast:
    alias: "Security Core Quarantine Selected Fast Add"
    mode: restart
    sequence:
      - variables:
          ip: "{{ states('sensor.security_core_selected_pretty_device_ip') }}"
      - condition: template
        value_template: "{{ ip not in ['unknown', '', none] }}"
      - service: script.quarantine_add
        data:
          ip: "{{ ip }}"
      - delay: "00:00:01"
      - service: script.security_core_refresh_dashboard_entities
      - delay: "00:00:02"
      - service: script.security_core_refresh_dashboard_entities

  security_core_quarantine_selected_remove_fast:
    alias: "Security Core Quarantine Selected Fast Remove"
    mode: restart
    sequence:
      - variables:
          ip: "{{ states('sensor.security_core_selected_pretty_device_ip') }}"
      - condition: template
        value_template: "{{ ip not in ['unknown', '', none] }}"
      - service: script.quarantine_remove
        data:
          ip: "{{ ip }}"
      - delay: "00:00:01"
      - service: script.security_core_refresh_dashboard_entities
      - delay: "00:00:02"
      - service: script.security_core_refresh_dashboard_entities
