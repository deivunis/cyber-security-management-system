input_select:
  security_core_inventory_device_pretty_select:
    name: "Security Core Inventory Device (Pretty)"
    options:
      - "No devices"
    initial: "No devices"
    icon: mdi:devices

automation:
  - alias: "Security Core: refresh pretty device selector"
    id: security_core_refresh_pretty_device_selector
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.security_core_inventory_raw
      - platform: time_pattern
        seconds: "/10"
    action:
      - service: input_select.set_options
        target:
          entity_id: input_select.security_core_inventory_device_pretty_select
        data:
          options: >
            {% set items = state_attr('sensor.security_core_inventory_raw', 'items') or [] %}
            {% set ns = namespace(opts=[]) %}
            {% for item in items %}
              {% set ip = item.get('current_ip') if item.get('current_ip') else 'no-ip' %}
              {% set name = item.get('hostname') if item.get('hostname') else (item.get('vendor') if item.get('vendor') else (item.get('mac_address') if item.get('mac_address') else 'unknown-device')) %}
              {% set confirmed = 'PATVIRTINTAS' if item.get('identity_confirmed') else 'NEPATVIRTINTAS' %}
              {% set online = 'ONLINE' if item.get('is_online') else 'OFFLINE' %}
              {% set label = name ~ ' | ' ~ confirmed ~ ' | ' ~ online ~ ' | ' ~ ip %}
              {% if label not in ns.opts %}
                {% set ns.opts = ns.opts + [label] %}
              {% endif %}
            {% endfor %}
            {{ ns.opts | sort if ns.opts | length > 0 else ['No devices'] }}
      - choose:
          - conditions: >
              {% set opts = state_attr('input_select.security_core_inventory_device_pretty_select', 'options') or [] %}
              {{ states('input_select.security_core_inventory_device_pretty_select') not in opts }}
            sequence:
              - service: input_select.select_first
                target:
                  entity_id: input_select.security_core_inventory_device_pretty_select

template:
  - sensor:
      - name: "Security Core Selected Pretty Device IP"
        unique_id: security_core_selected_pretty_device_ip
        state: >
          {% set s = states('input_select.security_core_inventory_device_pretty_select') %}
          {% if ' | ' in s %}
            {{ s.split(' | ')[-1].strip() }}
          {% else %}
            unknown
          {% endif %}

      - name: "Security Core Selected Pretty Device ID"
        unique_id: security_core_selected_pretty_device_id
        state: >
          {% set ip = states('sensor.security_core_selected_pretty_device_ip') %}
          {% set items = state_attr('sensor.security_core_inventory_raw', 'items') or [] %}
          {% set ns = namespace(value='unknown') %}
          {% for item in items %}
            {% if item.get('current_ip') == ip %}
              {% set ns.value = item.get('id') if item.get('id') else 'unknown' %}
            {% endif %}
          {% endfor %}
          {{ ns.value }}

      - name: "Security Core Selected Pretty Device Name"
