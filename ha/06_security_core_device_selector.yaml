      - name: "Security Core Selected Pretty Device Effective Status"
        unique_id: security_core_selected_pretty_device_effective_status
        state: >
          {% set ip = states('sensor.security_core_selected_pretty_device_ip') %}
          {% set q_rows = state_attr('sensor.opnsense_quarantine_list', 'rows') or [] %}
          {% set b_rows = state_attr('sensor.opnsense_internet_block_list', 'rows') or [] %}
          {% set q_ns = namespace(ips=[]) %}
          {% set b_ns = namespace(ips=[]) %}
          {% for row in q_rows %}
            {% set addr = row.get('address') or row.get('ip') or row.get('name') %}
            {% if addr %}
              {% set q_ns.ips = q_ns.ips + [addr] %}
            {% endif %}
          {% endfor %}
          {% for row in b_rows %}
            {% set addr = row.get('address') or row.get('ip') or row.get('name') %}
            {% if addr %}
              {% set b_ns.ips = b_ns.ips + [addr] %}
            {% endif %}
          {% endfor %}
          {% if ip in q_ns.ips %}
            quarantined
          {% elif ip in b_ns.ips %}
            blocked_internet
          {% else %}
            {{ states('sensor.security_core_selected_pretty_device_backend_status') }}
          {% endif %}

